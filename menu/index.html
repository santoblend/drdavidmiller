<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. David Miller</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:  #1a2744;
    --gold:  #c9a84c;
    --cream: #faf8f4;
    --white: #ffffff;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(26,39,68,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .top-line {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 32px;
    animation: fadeIn 1s ease both;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 22px;
    animation: fadeDown 0.8s ease both 0.1s;
  }

  .avatar-wrap::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--navy), var(--gold));
    z-index: 0;
    opacity: 0.8;
  }

  .avatar-wrap::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: var(--cream);
    z-index: 1;
  }

  .avatar {
    position: relative;
    z-index: 2;
    width: 112px;
    height: 112px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.5px;
    text-align: center;
    animation: fadeDown 0.8s ease both 0.2s;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .title {
    font-size: 11px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 7px;
    margin-bottom: 34px;
    animation: fadeDown 0.8s ease both 0.3s;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    animation: fadeIn 0.8s ease both 0.4s;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  .dl { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.45)); }
  .dl:last-child { background: linear-gradient(270deg, transparent, rgba(201,168,76,0.45)); }
  .dd { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

  .buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 17px 28px;
    border-radius: 3px;
    text-decoration: none;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  /* YouTube — flutua para cima e para baixo */
  .btn-yt {
    background: var(--navy);
    color: var(--white);
    border: 1.5px solid var(--navy);
    box-shadow: 0 8px 28px rgba(26,39,68,0.22);
    animation: fadeUp 0.8s ease 0.5s both, float 3s ease-in-out 1.4s infinite;
  }

  .btn-yt::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.18), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-yt:hover::before { opacity: 1; }
  .btn-yt:hover {
    box-shadow: 0 14px 36px rgba(26,39,68,0.38);
    animation-play-state: paused;
    transform: translateY(-3px);
  }

  .yt-icon {
    width: 24px;
    height: 24px;
    background: #FF0000;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .yt-icon::after {
    content: "";
    width: 0; height: 0;
    border-style: solid;
    border-width: 5.5px 0 5.5px 11px;
    border-color: transparent transparent transparent white;
    margin-left: 2px;
  }

  /* Infográfico */
  .btn-info {
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--gold);
    animation: fadeUp 0.8s ease forwards 0.65s;
  }
  .btn-info::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-info:hover::before { opacity: 1; }
  .btn-info:hover {
    box-shadow: 0 8px 24px rgba(201,168,76,0.28);
    transform: translateY(-2px);
  }

  .info-icon {
    width: 22px;
    height: 22px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 900;
    color: var(--gold);
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .btn-info:hover .info-icon { border-color: var(--navy); color: var(--navy); }

  .btn-label { position: relative; z-index: 1; }

  .bottom-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 38px;
    animation: fadeIn 1s ease both 0.9s;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 480px) {
    .name  { font-size: 22px; }
    .btn   { padding: 15px 20px; font-size: 12px; }
    .avatar { width: 96px; height: 96px; }
  }

  /* Botão Free Weekly Diet */
  .btn-diet {
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--gold);
    animation: fadeUp 0.8s ease forwards 0.5s;
  }
  .btn-diet::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-diet:hover::before { opacity: 1; }
  .btn-diet:hover {
    box-shadow: 0 8px 24px rgba(201,168,76,0.28);
    transform: translateY(-2px);
  }
  .diet-icon {
    width: 22px;
    height: 22px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    color: var(--gold);
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .btn-diet:hover .diet-icon { border-color: var(--navy); color: var(--navy); }
</style>
</head>
